<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 668 834" width="668" height="834">
  <defs>
    <marker id="seq-arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#111111" /></marker>
    <marker id="seq-open" markerWidth="11" markerHeight="9" refX="9" refY="4.5" orient="auto"><polyline points="0 0, 10 4.5, 0 9" fill="none" stroke="#111111" stroke-width="1.3" /></marker>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF" />
  <path d="M 79 90 L 79 810" stroke="#D6DEE8" stroke-width="1" fill="none" stroke-dasharray="3 4" />
  <path d="M 249 90 L 249 810" stroke="#D6DEE8" stroke-width="1" fill="none" stroke-dasharray="3 4" />
  <path d="M 419 90 L 419 810" stroke="#D6DEE8" stroke-width="1" fill="none" stroke-dasharray="3 4" />
  <path d="M 589 90 L 589 810" stroke="#D6DEE8" stroke-width="1" fill="none" stroke-dasharray="3 4" />
  <rect x="8" y="276" width="652" height="534" fill="none" stroke="#D6DEE8" stroke-width="1.2" rx="4" />
  <rect x="8" y="276" width="36.25" height="18" fill="#D6DEE8" stroke="#D6DEE8" stroke-width="0" />
  <text x="16" y="289" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#FFFFFF" font-weight="bold">ALT</text>
  <text x="52.25" y="289" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" font-weight="bold">[Valid credentials]</text>
  <path d="M 8 388 L 660 388" stroke="#D6DEE8" stroke-width="1" fill="none" stroke-dasharray="4 3" />
  <text x="16" y="401" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111">[Invalid credentials]</text>
  <rect x="8" y="490" width="652" height="320" fill="none" stroke="#D6DEE8" stroke-width="1.2" rx="4" />
  <rect x="8" y="490" width="46.02" height="18" fill="#D6DEE8" stroke="#D6DEE8" stroke-width="0" />
  <text x="16" y="503" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#FFFFFF" font-weight="bold">LOOP</text>
  <text x="62.02" y="503" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" font-weight="bold">[Token refresh (every 15 min)]</text>
  <rect x="8" y="602" width="652" height="208" fill="none" stroke="#D6DEE8" stroke-width="1.2" rx="4" />
  <rect x="8" y="602" width="38.06" height="18" fill="#D6DEE8" stroke="#D6DEE8" stroke-width="0" />
  <text x="16" y="615" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#FFFFFF" font-weight="bold">OPT</text>
  <text x="54.06" y="615" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" font-weight="bold">[Access protected resource]</text>
  <rect x="584" y="208" width="10" height="92" fill="#F4F6FA" stroke="#1F497D" stroke-width="1" rx="1" />
  <rect x="414" y="162" width="10" height="198" fill="#F4F6FA" stroke="#1F497D" stroke-width="1" rx="1" />
  <rect x="244" y="116" width="10" height="290" fill="#F4F6FA" stroke="#1F497D" stroke-width="1" rx="1" />
  <text x="24" y="42" font-size="18" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" font-weight="bold">User Authentication Flow</text>
  <text x="164" y="109" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">1. Enter credentials</text>
  <path d="M 79 116 L 249 116" stroke="#111111" stroke-width="1.3" fill="none" marker-end="url(#seq-arrow)" />
  <text x="334" y="155" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">2. POST /login</text>
  <path d="M 249 162 L 419 162" stroke="#111111" stroke-width="1.3" fill="none" marker-end="url(#seq-arrow)" />
  <text x="504" y="201" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">3. Query user record</text>
  <path d="M 419 208 L 589 208" stroke="#111111" stroke-width="1.3" fill="none" marker-end="url(#seq-arrow)" />
  <text x="504" y="247" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">4. User data + hash</text>
  <path d="M 589 254 L 419 254" stroke="#111111" stroke-width="1.3" fill="none" stroke-dasharray="5 4" marker-end="url(#seq-arrow)" />
  <text x="334" y="307" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">5. 200 JWT token</text>
  <path d="M 419 314 L 249 314" stroke="#111111" stroke-width="1.3" fill="none" stroke-dasharray="5 4" marker-end="url(#seq-arrow)" />
  <text x="164" y="353" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">6. Login successful</text>
  <path d="M 249 360 L 79 360" stroke="#111111" stroke-width="1.3" fill="none" stroke-dasharray="5 4" marker-end="url(#seq-arrow)" />
  <text x="334" y="409" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">7. 401 Unauthorized</text>
  <path d="M 419 416 L 249 416" stroke="#111111" stroke-width="1.3" fill="none" stroke-dasharray="5 4" marker-end="url(#seq-arrow)" />
  <text x="164" y="455" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">8. Show error message</text>
  <path d="M 249 462 L 79 462" stroke="#111111" stroke-width="1.3" fill="none" stroke-dasharray="5 4" marker-end="url(#seq-arrow)" />
  <text x="334" y="521" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">9. POST /refresh</text>
  <path d="M 249 528 L 419 528" stroke="#111111" stroke-width="1.3" fill="none" marker-end="url(#seq-arrow)" />
  <text x="334" y="567" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">10. New JWT token</text>
  <path d="M 419 574 L 249 574" stroke="#111111" stroke-width="1.3" fill="none" stroke-dasharray="5 4" marker-end="url(#seq-arrow)" />
  <text x="334" y="633" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">11. GET /api/data</text>
  <path d="M 249 640 L 419 640" stroke="#111111" stroke-width="1.3" fill="none" marker-end="url(#seq-arrow)" />
  <text x="334" y="679" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">12. 200 Protected data</text>
  <path d="M 419 686 L 249 686" stroke="#111111" stroke-width="1.3" fill="none" stroke-dasharray="5 4" marker-end="url(#seq-arrow)" />
  <rect x="375" y="732" width="258" height="30" fill="#D9770622" stroke="#D97706" stroke-width="1" rx="4" />
  <text x="504" y="751" font-size="11" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle">All DB queries use TLS</text>
  <rect x="24" y="56" width="110" height="34" fill="#1F497D" stroke="#D6DEE8" stroke-width="1.2" rx="6" />
  <text x="79" y="77.9" font-size="14" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#FFFFFF" text-anchor="middle" font-weight="bold">User</text>
  <rect x="194" y="56" width="110" height="34" fill="#F4F6FA" stroke="#D6DEE8" stroke-width="1.2" rx="6" />
  <text x="249" y="77.9" font-size="14" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle" font-weight="bold">Web Client</text>
  <rect x="364" y="56" width="110" height="34" fill="#F4F6FA" stroke="#D6DEE8" stroke-width="1.2" rx="6" />
  <text x="419" y="77.9" font-size="14" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle" font-weight="bold">Auth Service</text>
  <rect x="534" y="56" width="110" height="34" fill="#F4F6FA" stroke="#D6DEE8" stroke-width="1.2" rx="6" />
  <text x="589" y="77.9" font-size="14" font-family="Georgia, &quot;Times New Roman&quot;, serif" fill="#111111" text-anchor="middle" font-weight="bold">Database</text>
</svg>