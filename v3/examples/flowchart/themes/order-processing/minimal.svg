<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 168" width="1128" height="168">
  <defs>
    <marker id="triton-arrow" markerWidth="8" markerHeight="5.6" refX="7" refY="2.8" orient="auto"><polygon points="0 0, 8 2.8, 0 5.6" fill="#525252" /></marker>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF" />
  <path d="M 144 84 L 184 84" stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#triton-arrow)" />
  <path d="M 304 84 L 344 84" stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#triton-arrow)" />
  <path d="M 464 84 L 484 84 L 484 44 L 504 44" stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#triton-arrow)" />
  <text x="484" y="60" font-size="12" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#737373" text-anchor="middle">yes</text>
  <path d="M 464 84 L 484 84 L 484 124 L 504 124" stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#triton-arrow)" />
  <text x="484" y="100" font-size="12" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#737373" text-anchor="middle">no</text>
  <path d="M 624 44 L 644 44 L 644 84 L 664 84" stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#triton-arrow)" />
  <path d="M 784 84 L 824 84" stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#triton-arrow)" />
  <path d="M 944 84 L 984 84" stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#triton-arrow)" />
  <g id="cart">
    <rect x="24" y="64" width="120" height="40" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1.5" rx="2" />
    <text x="84" y="88.9" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#171717" text-anchor="middle">Shopping Cart</text>
  </g>
  <g id="checkout">
    <rect x="184" y="64" width="120" height="40" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1.5" rx="2" />
    <text x="244" y="88.9" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#171717" text-anchor="middle">Checkout</text>
  </g>
  <g id="pay">
    <path d="M 404 64 L 464 84 L 404 104 L 344 84 Z" stroke="#E5E5E5" stroke-width="1.5" fill="#F5F5F5" />
    <text x="404" y="88.9" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#171717" text-anchor="middle">Payment OK?</text>
  </g>
  <g id="reserve">
    <rect x="504" y="24" width="120" height="40" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1.5" rx="2" />
    <text x="564" y="48.9" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#171717" text-anchor="middle">Reserve Stock</text>
  </g>
  <g id="decline">
    <rect x="504" y="104" width="120" height="40" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1.5" rx="20" />
    <text x="564" y="128.9" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#171717" text-anchor="middle">Decline Order</text>
  </g>
  <g id="ship">
    <rect x="664" y="64" width="120" height="40" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1.5" rx="20" />
    <text x="724" y="88.9" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#171717" text-anchor="middle">Ship Order</text>
  </g>
  <g id="email">
    <rect x="824" y="64" width="120" height="40" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1.5" rx="20" />
    <text x="884" y="88.9" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#171717" text-anchor="middle">Email Customer</text>
  </g>
  <g id="done">
    <rect x="984" y="64" width="120" height="40" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1.5" rx="20" />
    <text x="1044" y="88.9" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#171717" text-anchor="middle">Complete</text>
  </g>
