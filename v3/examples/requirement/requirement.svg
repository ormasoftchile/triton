  <text x="308" y="228.5" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">id: REQ-002</text>
  <text x="308" y="245.5" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">text: All access events shall be logged</text>
  <text x="308" y="262.5" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">with timestamp and user identity.</text>
  <text x="308" y="279.5" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">risk: medium</text>
  <text x="308" y="296.5" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">verifymethod: analysis</text>
