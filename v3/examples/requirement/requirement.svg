  <text x="171" y="430" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">id: CON-001</text>
  <text x="171" y="447" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">text: Audit logs must be retained for a</text>
