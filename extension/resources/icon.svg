<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- Background gradient: deep navy to dark purple -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <!-- Trident gradient: bright cyan to teal (top to bottom) -->
    <linearGradient id="tridentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <!-- Subtle node glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bgGrad)"/>
  
  <!-- TRIDENT using filled shapes (rects with rounded ends) -->
  <!-- Main shaft -->
  <rect x="117" y="70" width="22" height="152" rx="11" fill="url(#tridentGrad)"/>
  
  <!-- Crossbar -->
  <rect x="50" y="82" width="156" height="16" rx="8" fill="url(#tridentGrad)"/>
  
  <!-- Left prong -->
  <rect x="50" y="37" width="16" height="53" rx="8" fill="url(#tridentGrad)"/>
  
  <!-- Center prong -->
  <rect x="120" y="24" width="16" height="54" rx="8" fill="url(#tridentGrad)"/>
  
  <!-- Right prong -->
  <rect x="190" y="37" width="16" height="53" rx="8" fill="url(#tridentGrad)"/>
  
  <!-- Shaft bottom flourish -->
  <path d="M115 216 Q128 228 141 216" stroke="#4A90D9" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Graph edges (purple) -->
  <path d="M58 33 Q93 20 128 20" stroke="#7C3AED" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M198 33 Q163 20 128 20" stroke="#7C3AED" stroke-width="3" fill="none" opacity="0.7"/>
  
  <!-- Graph nodes -->
  <circle cx="128" cy="20" r="11" fill="#7C3AED" filter="url(#glow)"/>
  <circle cx="128" cy="20" r="5" fill="#F8FAFC"/>
  
  <circle cx="58" cy="33" r="9" fill="#4A90D9" filter="url(#glow)"/>
  <circle cx="58" cy="33" r="4" fill="#F8FAFC"/>
  
  <circle cx="198" cy="33" r="9" fill="#4A90D9" filter="url(#glow)"/>
  <circle cx="198" cy="33" r="4" fill="#F8FAFC"/>
</svg>
