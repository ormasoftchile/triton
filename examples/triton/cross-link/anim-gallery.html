<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Triton connector animation gallery</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      padding: 24px;
      background: #f6f8fb;
      color: #172033;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    h1 { margin: 0 0 16px; font-size: 24px; }
    .frame {
      background: white;
      border: 1px solid #d7dde8;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgb(15 23 42 / 10%);
      padding: 16px;
    }
    object { display: block; width: 100%; min-height: 1200px; }
  </style>
</head>
<body>
  <h1>Triton connector animation gallery</h1>
  <div class="frame">
    <object data="./anim-gallery.svg" type="image/svg+xml" aria-label="Connector animation gallery"></object>
  </div>
</body>
</html>
