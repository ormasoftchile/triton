# timeline-goals.timeline.yaml — "04 · Timeline & Goals" slide recreation.
#
# Recreates the horizontal engineering-roadmap slide with:
#   - Three coloured phase pills (icon badge + title + subtitle)
#   - Six milestone callouts above the axis (date dot + leader + label block)
#   - A DISCONTINUOUS AXIS: the dead gap Nov 2025 → Apr 2026 is collapsed with
#     a "//" break marker (axis_breaks feature, Barbara 2026-06-12).
#
# theme: roadmap — tall barHeight (36 px) renders two-line phase pills.
# Two tracks are declared so milestones without an explicit track assignment
# are forced above the axis (hasMultipleTracks = true).
version: "1.0"
metadata:
  title: "Timeline & Goals"
  subtitle: "Engineering Roadmap · 2025 – 2026"
  time_range:
    start: 2025-11-01
    end: 2026-11-30
  axis_unit: quarter
  theme: roadmap
  today: 2026-06-12
  axis_breaks:
    - from: 2026-01-15
      to: 2026-04-01

tracks:
  - id: phases
    label: "Phases"
    index: 0
  - id: markers
    label: "Milestones"
    index: 1

activities:
  - id: functional-readiness
    label: "Functional Readiness"
    description: "Tools installable and functional"
    track: phases
    start: 2025-11-01
    end: 2026-03-31
    color: "#6B7280"
    icon: wrench

  - id: evangelization
    label: "Evangelization"
    description: "Increase adoption + track blockers"
    track: phases
    start: 2026-04-01
    end: 2026-07-31
    color: "#0F766E"
    icon: bolt

  - id: physical-saw-reduction
    label: "Physical SAW Reduction"
    description: "Start removing Physical SAW dependency"
    track: phases
    start: 2026-08-01
    end: 2026-10-31
    color: "#1e3a5f"
    icon: check

milestones:
  - id: tools-installable
    label: "Tools installable and functional"
    date: 2025-11-01
    status: done
    icon: check
    color: "#4ADE80"

  - id: msi-installer
    label: "MSI Installer / Install Path"
    date: 2026-06-30
    status: in-progress
    icon: wrench
    color: "#3B82F6"

  - id: adoption-goal
    label: "Adoption goal 40-80 WAU"
    date: 2026-07-01
    status: planned
    icon: rocket
    color: "#3B82F6"

  - id: adoption-signoff
    label: "80% adoption + queue signoff"
    date: 2026-08-01
    status: planned
    icon: check
    color: "#0F766E"

  - id: reduce-saw
    label: "Reduce Physical SAW dependency"
    date: 2026-09-01
    status: planned
    icon: target
    color: "#1e3a5f"

  - id: no-physical-saw
    label: "No Physical SAW for device refresh"
    date: 2026-11-01
    status: planned
    icon: goal
    color: "#1e3a5f"
    category: goal
