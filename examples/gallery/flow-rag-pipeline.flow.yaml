# Flow Grammar Example — RAG Retrieval Pipeline
#
# A Retrieval-Augmented Generation pipeline demonstrating:
#   - Linear chain: question → retrieve → rank → augment → llm → answer
#   - One branch: retrieve → direct (exact-match path) merging at augment
#   - Mixed edge styles: solid, animated (dashed resting frame)
#   - Status hints: success on terminal/branch nodes
#   - Icon hints: database, sparkles
#
# Layout (increment-1 layered):
#   Layer 0: question
#   Layer 1: retrieve
#   Layer 2: rank, direct    ← two nodes in this column (branch)
#   Layer 3: augment
#   Layer 4: llm
#   Layer 5: answer

version: "1.0"
metadata:
  title: "RAG Retrieval Pipeline"
  theme: default-flow

flow:
  nodes:
    - id: question
      label: "User Question"
      kind: stadium

    - id: retrieve
      label: "Retrieve"
      kind: rounded-rect
      icon: database

    - id: rank
      label: "Re-rank"
      kind: rounded-rect

    - id: direct
      label: "Direct Match"
      kind: rounded-rect
      status: success

    - id: augment
      label: "Augment"
      kind: rounded-rect

    - id: llm
      label: "LLM Generate"
      kind: rounded-rect
      icon: sparkles

    - id: answer
      label: "Grounded Answer"
      kind: stadium
      status: success

  edges:
    - from: question
      to: retrieve

    - from: retrieve
      to: rank
      label: "top-k"

    - from: retrieve
      to: direct
      label: "exact match"
      style: dashed

    - from: rank
      to: augment

    - from: direct
      to: augment

    - from: augment
      to: llm
      animated: true

    - from: llm
      to: answer
      animated: true
