# Flow Grammar Example — Auth Request Decision Flow
#
# Demonstrates the 'diamond' decision node shape (kind: diamond).
# A diamond renders as a rhombus with label centered inside; edges
# attach at the left/right tips (forward flow) so branching is clear.
#
# Layout:
#   Layer 0: request  (stadium — entry)
#   Layer 1: validate (rounded-rect — processing step)
#   Layer 2: auth-check (diamond — decision)
#   Layer 3: process, reject  (success / error terminals)

version: "1.0"
metadata:
  title: "Auth Request Flow"
  theme: default-flow

flow:
  nodes:
    - id: request
      label: "Request"
      kind: stadium

    - id: validate
      label: "Validate"
      kind: rounded-rect

    - id: auth-check
      label: "Auth OK?"
      kind: diamond

    - id: process
      label: "Process"
      kind: rounded-rect
      status: success

    - id: reject
      label: "Reject"
      kind: rounded-rect
      status: error

  edges:
    - from: request
      to: validate

    - from: validate
      to: auth-check

    - from: auth-check
      to: process
      label: "yes"

    - from: auth-check
      to: reject
      label: "no"
