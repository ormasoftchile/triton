version: "1.0"
metadata:
  title: "Agent Retry Loop"
  subtitle: "LLM agent with tool retry and self-reflection — ByteByteGo style"
  theme: bytebytego-sequence
sequence:
  participants:
    - id: user
      label: "User"
      kind: actor
      icon: people
    - id: agent
      label: "Agent"
      kind: object
      icon: gear
    - id: tool
      label: "Tool"
      kind: object
      icon: bolt
  messages:
    - from: user
      to: agent
      label: "invoke(task)"
      order: 1
      kind: sync
    - from: agent
      to: tool
      label: "call(args)"
      order: 2
      kind: async
    - from: tool
      to: agent
      label: "503 error"
      order: 3
      kind: reply
    - from: agent
      to: agent
      label: "reflect"
      order: 4
      kind: sync
    - from: agent
      to: tool
      label: "retry(args)"
      order: 5
      kind: async
    - from: tool
      to: agent
      label: "200 OK"
      order: 6
      kind: reply
    - from: agent
      to: user
      label: "response"
      order: 7
      kind: reply
  activations:
    - participant: agent
      from_order: 2
      to_order: 6
  fragments:
    - kind: loop
      label: "[retry until 200]"
      from_order: 2
      to_order: 6
    - kind: opt
      label: "[if token valid]"
      from_order: 7
      to_order: 7
