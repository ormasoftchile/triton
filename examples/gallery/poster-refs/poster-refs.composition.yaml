# Composition Example — Poster with External ir_file References
#
# This poster demonstrates the ir_file reference feature: cells reference
# sibling grammar files instead of inlining the sub-document IR.
#
# Before passing to buildCompositionScene, call:
#   resolveCompositionRefs(doc, dirname(thisFile))
#
# After resolution the ref cells are replaced with their inline equivalents
# and the poster is byte-deterministically rendered.

version: "1.0"
metadata:
  title: "Poster via ir_file Refs"
  theme: default

grid:
  columns: 2
  rows: 2

cells:
  # ── Top-left: Flow diagram loaded from external file ─────────────────────
  - id: flow-panel
    col: 0
    row: 0
    title: "Auth Request Flow"
    content:
      kind: ref
      grammar: flow
      ir_file: "./pipeline.flow.yaml"

  # ── Top-right: Tree diagram loaded from external file ────────────────────
  - id: tree-panel
    col: 1
    row: 0
    title: "Document Taxonomy"
    content:
      kind: ref
      grammar: tree
      ir_file: "./taxonomy.tree.yaml"

  # ── Bottom-left: inline stat callout ─────────────────────────────────────
  - id: stat-panel
    col: 0
    row: 1
    title: "Key Metric"
    content:
      kind: stat
      value: "98.7%"
      label: "validation accuracy"

  # ── Bottom-right: inline text description ────────────────────────────────
  - id: text-panel
    col: 1
    row: 1
    content:
      kind: text
      text: "External refs keep each panel versioned independently."
