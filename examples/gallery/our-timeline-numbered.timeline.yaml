# T1 IR fixture — "Our Timeline" (target-horizontal-numbered.png)
#
# Three numbered circular nodes on a horizontal axis.  Alternating above/below
# label placement is handled automatically by the horizontal layout engine
# (index 0 → below, index 1 → above, index 2 → below).
#
# Key visual intent (matching T1 target):
#   Node 01 — Application Deadline  — status: done       → hollow circle
#   Node 02 — Qualifying Exam       — status: in-progress → filled/highlighted circle
#   Node 03 — Training Starts       — status: planned     → hollow circle
