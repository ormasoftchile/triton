# The `our-timeline` theme renders hollow (white-fill + navy-stroke) nodes for
# all statuses except `in-progress` (navy-filled).  ordinalColorContrast:true
# auto-picks dark ordinal text on hollow nodes and white on the filled node.
#
# Legend is suppressed via `legend.show: false` — the T1 target has none.
