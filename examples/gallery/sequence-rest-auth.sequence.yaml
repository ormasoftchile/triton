version: "1.0"
metadata:
  title: "Token-Based REST API Authentication"
  theme: default-sequence
sequence:
  participants:
    - id: client
      label: "Client"
      kind: actor
    - id: server
      label: "Auth Server"
      kind: object
  messages:
    - from: client
      to: server
      label: "POST /auth/token (credentials)"
      order: 1
      kind: sync
    - from: server
      to: client
      label: "200 OK { token: 'jwt...' }"
      order: 2
      kind: reply
    - from: client
      to: server
      label: "GET /api/data (Authorization: Bearer jwt...)"
      order: 3
      kind: sync
    - from: server
      to: client
      label: "200 OK { data: [...] }"
      order: 4
      kind: reply
  activations:
    - participant: server
      from_order: 1
      to_order: 2
    - participant: server
      from_order: 3
      to_order: 4
