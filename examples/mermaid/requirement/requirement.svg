  <text x="550" y="205.5" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B" text-anchor="middle" font-weight="bold">AuditLogging</text>
  <path d="M 435 214.5 L 665 214.5" stroke="#CBD5E1" stroke-width="1" fill="none" />
  <text x="445" y="228.5" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">id: REQ-002</text>
  <text x="445" y="245.5" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">text: All access events shall be logged</text>
  <text x="445" y="262.5" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">with timestamp and user identity.</text>
  <text x="445" y="279.5" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">risk: medium</text>
  <text x="445" y="296.5" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">verifymethod: analysis</text>
