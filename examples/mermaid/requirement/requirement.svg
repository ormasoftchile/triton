  <text x="171" y="220" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">id: REQ-001</text>
  <text x="171" y="237" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">text: The system shall authenticate users</text>
  <text x="171" y="254" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">via username and password with MFA</text>
  <text x="171" y="271" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">support.</text>
  <text x="171" y="288" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">risk: high</text>
  <text x="171" y="305" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B">verifymethod: test</text>
