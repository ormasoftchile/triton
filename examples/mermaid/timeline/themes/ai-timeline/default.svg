<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 664 1013" width="664" height="1013">
  <rect width="100%" height="100%" fill="#FFFFFF" />
  <path d="M 332 98 L 332 942" stroke="#CBD5E1" stroke-width="2.5" fill="none" />
  <text x="332" y="42" font-size="18" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B" text-anchor="middle" font-weight="bold">THE AI TIMELINE</text>
  <text x="332" y="64" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="middle">From symbolic AI to foundation models — a 60-year arc of progress</text>
  <path d="M 332 145 L 380 145" stroke="#CBD5E1" stroke-width="1.5" fill="none" />
  <rect x="380" y="98" width="260" height="94" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" rx="8" />
  <rect x="380" y="98" width="3" height="94" fill="#7C3AED" stroke="#7C3AED" stroke-width="0" />
  <text x="392" y="121" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#7C3AED" text-anchor="start" font-weight="bold">1st January 1967</text>
  <text x="392" y="139" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B" text-anchor="start" font-weight="bold">ELIZA Chatbot</text>
  <text x="392" y="159" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">First conversational program by Weizenbaum at</text>
  <text x="392" y="174" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">MIT</text>
  <circle cx="332" cy="145" r="7" fill="#7C3AED" stroke="#FFFFFF" stroke-width="2" />
  <path d="M 332 261 L 284 261" stroke="#CBD5E1" stroke-width="1.5" fill="none" />
  <rect x="24" y="214" width="260" height="94" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" rx="8" />
  <rect x="281" y="214" width="3" height="94" fill="#0EA5A8" stroke="#0EA5A8" stroke-width="0" />
  <text x="36" y="237" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#0EA5A8" text-anchor="start" font-weight="bold">1967</text>
  <text x="36" y="255" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B" text-anchor="start" font-weight="bold">Symbolic AI Era</text>
  <text x="36" y="275" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">Logic-based reasoning, rule engines, LISP.</text>
  <text x="36" y="290" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">MYCIN, Prolog, knowledge graphs.</text>
  <circle cx="332" cy="261" r="7" fill="#0EA5A8" stroke="#FFFFFF" stroke-width="2" />
  <path d="M 332 377 L 380 377" stroke="#CBD5E1" stroke-width="1.5" fill="none" />
  <rect x="380" y="330" width="260" height="94" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" rx="8" />
  <rect x="380" y="330" width="3" height="94" fill="#D97706" stroke="#D97706" stroke-width="0" />
  <text x="392" y="353" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#D97706" text-anchor="start" font-weight="bold">1986</text>
  <text x="392" y="371" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B" text-anchor="start" font-weight="bold">Connectionism &amp; Neural Nets</text>
  <text x="392" y="391" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">Backprop enables multi-layer networks. SVMs,</text>
  <text x="392" y="406" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">gradient boosting, early CNNs.</text>
  <circle cx="332" cy="377" r="7" fill="#D97706" stroke="#FFFFFF" stroke-width="2" />
  <path d="M 332 493 L 284 493" stroke="#CBD5E1" stroke-width="1.5" fill="none" />
  <rect x="24" y="446" width="260" height="94" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" rx="8" />
  <rect x="281" y="446" width="3" height="94" fill="#5B4FCF" stroke="#5B4FCF" stroke-width="0" />
  <text x="36" y="469" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#5B4FCF" text-anchor="start" font-weight="bold">1st October 1986</text>
  <text x="36" y="487" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B" text-anchor="start" font-weight="bold">Backpropagation Paper</text>
  <text x="36" y="507" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">Rumelhart, Hinton, Williams — learning internal</text>
  <text x="36" y="522" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">representations</text>
  <circle cx="332" cy="493" r="7" fill="#5B4FCF" stroke="#FFFFFF" stroke-width="2" />
  <path d="M 332 609 L 380 609" stroke="#CBD5E1" stroke-width="1.5" fill="none" />
  <rect x="380" y="562" width="260" height="94" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" rx="8" />
  <rect x="380" y="562" width="3" height="94" fill="#DB2777" stroke="#DB2777" stroke-width="0" />
  <text x="392" y="585" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#DB2777" text-anchor="start" font-weight="bold">2012</text>
  <text x="392" y="603" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B" text-anchor="start" font-weight="bold">Deep Learning Explosion</text>
  <text x="392" y="623" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">GPU compute + big data + deep nets.</text>
  <text x="392" y="638" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">ImageNet moments, word2vec, ResNets.</text>
  <circle cx="332" cy="609" r="7" fill="#DB2777" stroke="#FFFFFF" stroke-width="2" />
  <path d="M 332 718 L 284 718" stroke="#CBD5E1" stroke-width="1.5" fill="none" />
  <rect x="24" y="678" width="260" height="79" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" rx="8" />
  <rect x="281" y="678" width="3" height="79" fill="#2563EB" stroke="#2563EB" stroke-width="0" />
  <text x="36" y="701" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#2563EB" text-anchor="start" font-weight="bold">30th September 2012</text>
  <text x="36" y="719" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B" text-anchor="start" font-weight="bold">AlexNet — ImageNet</text>
  <text x="36" y="739" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">GPU deep learning era begins</text>
  <circle cx="332" cy="718" r="7" fill="#2563EB" stroke="#FFFFFF" stroke-width="2" />
  <path d="M 332 826 L 380 826" stroke="#CBD5E1" stroke-width="1.5" fill="none" />
  <rect x="380" y="779" width="260" height="94" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" rx="8" />
  <rect x="380" y="779" width="3" height="94" fill="#16A34A" stroke="#16A34A" stroke-width="0" />
  <text x="392" y="802" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#16A34A" text-anchor="start" font-weight="bold">2020</text>
  <text x="392" y="820" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B" text-anchor="start" font-weight="bold">Foundation Model Era</text>
  <text x="392" y="840" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">Scale laws, few-shot learning, RLHF alignment.</text>
  <text x="392" y="855" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">GPT-3, ChatGPT, GPT-4.</text>
  <circle cx="332" cy="826" r="7" fill="#16A34A" stroke="#FFFFFF" stroke-width="2" />
  <path d="M 332 942 L 284 942" stroke="#CBD5E1" stroke-width="1.5" fill="none" />
  <rect x="24" y="895" width="260" height="94" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" rx="8" />
  <rect x="281" y="895" width="3" height="94" fill="#CA8A04" stroke="#CA8A04" stroke-width="0" />
  <text x="36" y="918" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#CA8A04" text-anchor="start" font-weight="bold">30th November 2022</text>
  <text x="36" y="936" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#1E293B" text-anchor="start" font-weight="bold">ChatGPT Launch</text>
  <text x="36" y="956" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">100M users in 60 days — AI reaches</text>
  <text x="36" y="971" font-size="11" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#64748B" text-anchor="start">mainstream</text>
  <circle cx="332" cy="942" r="7" fill="#CA8A04" stroke="#FFFFFF" stroke-width="2" />
</svg>